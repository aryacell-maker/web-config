<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redirecting...</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f001f;
    overflow:hidden;
    font-family:sans-serif;
}

.card{
    width:320px;
    padding:40px;
    border-radius:25px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.1);

    box-shadow:
    0 0 30px #a855f7;

    text-align:center;

    color:white;
}

.loader{
    width:80px;
    height:80px;
    border-radius:50%;

    border:5px solid rgba(255,255,255,0.1);
    border-top:5px solid #c084fc;

    margin:auto;

    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

h1{
    margin-top:25px;
    text-shadow:0 0 15px #c084fc;
}

p{
    opacity:0.7;
}

</style>
</head>
<body>

<div class="card">

<div class="loader"></div>

<h1>REDIRECTING</h1>

<p>Connecting secure server...</p>

</div>

<script>

setTimeout(() => {

const url =
"https:google.com?v="
+ Date.now();

window.location.href = url;

}, 3000);

</script>

</body>
</html>
