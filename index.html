<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connecting Server</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"JetBrains Mono", monospace;
-webkit-tap-highlight-color:transparent;
}

body{
background:
radial-gradient(circle at 20% 25%, rgba(139,92,246,.15), transparent 50%),
radial-gradient(circle at 80% 75%, rgba(139,92,246,.15), transparent 50%),
#050610;

color:#fff;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

overflow:hidden;
}

/* GLOW */

.glow{
position:absolute;
width:450px;
height:450px;
background:#8b5cf6;
filter:blur(140px);
opacity:.18;
animation:pulse 4s infinite alternate;
}

@keyframes pulse{
from{
transform:scale(1);
}
to{
transform:scale(1.2);
}
}

/* CARD */

.card{
width:340px;

padding:35px 28px;

border-radius:28px;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(16px);

box-shadow:
0 0 35px rgba(139,92,246,.18);

text-align:center;

position:relative;

z-index:2;
}

/* ICON */

.icon{
width:95px;
height:95px;

margin:auto;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

border:4px solid rgba(255,255,255,.08);
border-top:4px solid #a855f7;

animation:spin 1s linear infinite;

box-shadow:
0 0 25px rgba(168,85,247,.45);
}

.icon i{
font-size:34px;
color:#c084fc;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* TITLE */

.title{
margin-top:28px;

font-size:28px;

font-weight:800;

letter-spacing:4px;

text-shadow:
0 0 18px rgba(192,132,252,.7);
}

/* SUB */

.sub{
margin-top:14px;

font-size:13px;

opacity:.7;

line-height:1.6;
}

/* BAR */

.bar{
width:100%;

height:7px;

background:rgba(255,255,255,.06);

border-radius:999px;

overflow:hidden;

margin-top:30px;
}

.fill{
height:100%;

width:0%;

background:linear-gradient(
90deg,
#7c3aed,
#c084fc
);

border-radius:999px;

animation:loading 2.3s linear forwards;
}

@keyframes loading{
100%{
width:100%;
}
}

/* FOOTER */

.footer{
margin-top:24px;

font-size:11px;

opacity:.45;

letter-spacing:1px;
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="card">

<div class="icon">
<i class="fa-solid fa-bolt"></i>
</div>

<div class="title">
CONNECTING
</div>

<div class="sub">
Please wait while we connect you<br>
to the secure server...
</div>

<div class="bar">
<div class="fill"></div>
</div>

<div class="footer">
gℓαмσυя secure connection
</div>

</div>

<script>

/*
===========================
EDIT URL DI SINI
===========================
*/

fetch("url.txt?t=" + Date.now())

.then(res => res.text())

.then(url => {

setTimeout(() => {

window.location.replace(
url.trim() + "?t=" + Date.now()
);

}, 2500);

});

</script>

</body>
</html>
